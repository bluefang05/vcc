<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#0a2540"/>
  
  <!-- Outer Ring Gradient -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Headset Band -->
  <path d="M 60 80 Q 100 40 140 80" stroke="url(#blueGradient)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Headset Left Ear Cup -->
  <ellipse cx="60" cy="85" rx="12" ry="18" fill="url(#blueGradient)" filter="url(#glow)"/>
  
  <!-- Headset Right Ear Cup -->
  <ellipse cx="140" cy="85" rx="12" ry="18" fill="url(#blueGradient)" filter="url(#glow)"/>
  
  <!-- Microphone Boom -->
  <path d="M 60 90 Q 50 110 65 120" stroke="#00d4d4" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Microphone Head -->
  <circle cx="65" cy="120" r="6" fill="#00d4d4" filter="url(#glow)"/>
  
  <!-- Person Silhouette (shoulders) -->
  <path d="M 70 140 Q 100 160 130 140 L 130 170 Q 100 180 70 170 Z" fill="url(#blueGradient)" opacity="0.8"/>
  
  <!-- Connection Waves (representing communication) -->
  <path d="M 150 100 Q 160 95 170 100" stroke="#00d4d4" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6">
    <animate attributeName="d" values="M 150 100 Q 160 95 170 100;M 150 100 Q 160 105 170 100;M 150 100 Q 160 95 170 100" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 155 110 Q 165 105 175 110" stroke="#00d4d4" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4">
    <animate attributeName="d" values="M 155 110 Q 165 105 175 110;M 155 110 Q 165 115 175 110;M 155 110 Q 165 105 175 110" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </path>
  <path d="M 160 120 Q 170 115 180 120" stroke="#00d4d4" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.3">
    <animate attributeName="d" values="M 160 120 Q 170 115 180 120;M 160 120 Q 170 125 180 120;M 160 120 Q 170 115 180 120" dur="2s" repeatCount="indefinite" begin="1s"/>
  </path>
  
  <!-- VCC Text -->
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00d4d4" text-anchor="middle">VCC</text>
</svg>
